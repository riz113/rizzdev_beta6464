<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Riwayat - Green App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f5f7fb; padding: 1rem; padding-bottom: 80px; }
    .container { max-width: 600px; margin: 0 auto; }
    .card { background: white; border-radius: 1rem; padding: 1rem; margin-bottom: 0.75rem; }
    .status { font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 9999px; display: inline-block; }
    .completed { background: #d1fae5; color: #065f46; }
    .pending { background: #fef3c7; color: #b45309; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 0.75rem; max-width: 600px; margin: 0 auto; border-top: 1px solid #e5e7eb; }
    .bottom-nav a { text-align: center; color: #6b7280; text-decoration: none; font-size: 0.75rem; }
  </style>
</head>
<body>
<div class="container">
  <h2 style="margin-bottom:1rem;">📋 Riwayat Penjemputan</h2>
  <div id="historyList">Memuat...</div>
</div>
<div class="bottom-nav">
  <a href="dashboard-user.html">🏠 Beranda</a>
  <a href="history.html" class="active">📋 Riwayat</a>
  <a href="profile.html">👤 Profil</a>
</div>
<script>
  function loadHistory() {
    const orders = JSON.parse(localStorage.getItem('greenapp_orders')) || [];
    const container = document.getElementById('historyList');
    if (orders.length === 0) {
      container.innerHTML = '<div class="card">Belum ada riwayat penjemputan</div>';
      return;
    }
    container.innerHTML = orders.map(o => `
      <div class="card">
        <div style="display:flex; justify-content:space-between;">
          <span><strong>${o.category === 'organic' ? 'Organik' : o.category === 'inorganic' ? 'Anorganik' : 'Elektronik'}</strong></span>
          <span class="status ${o.status === 'completed' ? 'completed' : 'pending'}">${o.status === 'completed' ? 'Selesai' : 'Proses'}</span>
        </div>
        <div style="font-size:0.85rem;">Berat: ${o.actualWeight || o.estimatedWeight} kg</div>
        <div style="font-size:0.75rem; color:#6b7280;">${o.pickupAddress}</div>
        ${o.pointsEarned ? `<div style="color:#0FBA68;">+${o.pointsEarned} poin</div>` : ''}
        <div style="font-size:0.7rem; margin-top:0.5rem;">${new Date(o.createdAt).toLocaleString()}</div>
      </div>
    `).join('');
  }
  loadHistory();
</script>
</body>
</html>
