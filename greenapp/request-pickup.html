<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Request Penjemputan - Green App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f5f7fb; padding: 1rem; }
    .container { max-width: 600px; margin: 0 auto; }
    .card { background: white; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1rem; }
    .btn { background: #0FBA68; color: white; border: none; padding: 0.75rem 1rem; border-radius: 9999px; font-weight: 600; width: 100%; cursor: pointer; min-height: 48px; }
    input, select, textarea { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 1rem; margin-top: 0.25rem; margin-bottom: 1rem; font-family: inherit; }
    label { font-weight: 500; }
    .category-btn { display: inline-block; width: 30%; margin: 0.5rem 1%; padding: 0.75rem; border-radius: 1rem; background: #f3f4f6; text-align: center; cursor: pointer; border: 2px solid transparent; }
    .category-btn.selected { background: #d1fae5; border-color: #0FBA68; }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h2 style="margin-bottom:1rem;">📦 Request Penjemputan</h2>
    <label>Kategori Sampah</label>
    <div>
      <div data-cat="organic" class="category-btn" onclick="selectCategory('organic')">🍌 Organik</div>
      <div data-cat="inorganic" class="category-btn" onclick="selectCategory('inorganic')">🥤 Anorganik</div>
      <div data-cat="electronic" class="category-btn" onclick="selectCategory('electronic')">🔋 Elektronik</div>
    </div>
    <input type="hidden" id="category" value="organic">
    
    <label>Estimasi Berat (kg)</label>
    <input type="number" id="weight" value="1.0" step="0.5" min="0.1" max="100">
    
    <label>Alamat Penjemputan</label>
    <textarea id="address" rows="2">Jl. Merdeka No. 10, Jakarta</textarea>
    
    <label>Jadwal (minimal 1 jam dari sekarang)</label>
    <input type="datetime-local" id="schedule">
    
    <label>Instruksi Khusus (opsional)</label>
    <textarea id="instructions" rows="2" placeholder="Belakang rumah, lantai 3, dll"></textarea>
    
    <button class="btn" onclick="submitRequest()">Kirim Request</button>
  </div>
</div>
<script>
  function selectCategory(cat) {
    document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('selected'));
    document.querySelector(`[data-cat="${cat}"]`).classList.add('selected');
    document.getElementById('category').value = cat;
  }
  // Set default selected
  document.getElementById('category').value = 'organic';
  document.querySelector('[data-cat="organic"]').classList.add('selected');
  
  // Set min datetime
  const now = new Date();
  now.setHours(now.getHours() + 1);
  const yyyy = now.getFullYear();
  const mm = String(now.getMonth() + 1).padStart(2,'0');
  const dd = String(now.getDate()).padStart(2,'0');
  const hh = String(now.getHours()).padStart(2,'0');
  const min = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('schedule').value = `${yyyy}-${mm}-${dd}T${hh}:${min}`;
  
  function submitRequest() {
    const category = document.getElementById('category').value;
    const estimatedWeight = parseFloat(document.getElementById('weight').value);
    const pickupAddress = document.getElementById('address').value;
    const scheduledTime = document.getElementById('schedule').value;
    const instructions = document.getElementById('instructions').value;
    
    if (!pickupAddress) { alert('Alamat wajib diisi'); return; }
    if (estimatedWeight < 0.1) { alert('Berat minimal 0.1 kg'); return; }
    
    let orders = JSON.parse(localStorage.getItem('greenapp_orders')) || [];
    const newOrder = {
      id: Date.now().toString(),
      category,
      estimatedWeight,
      pickupAddress,
      scheduledTime,
      specialInstructions: instructions,
      status: 'pending',
      actualWeight: null,
      pointsEarned: null,
      createdAt: new Date().toISOString()
    };
    orders.unshift(newOrder);
    localStorage.setItem('greenapp_orders', JSON.stringify(orders));
    alert('Request berhasil dikirim! Kurir akan segera diproses.');
    window.location.href = 'dashboard-user.html';
  }
</script>
</body>
</html>
